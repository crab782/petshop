[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=tests
    --cov-report=term-missing
    --cov-report=html:coverage-reports/html
    --cov-report=xml:coverage-reports/coverage.xml
    --html=test-reports/report.html
    --self-contained-html
    --junitxml=test-reports/junit.xml
    --alluredir=test-reports/allure

markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    slow: Slow running tests
    api: API tests
    db: Database tests
    auth: Authentication tests
    user: User-related tests
    merchant: Merchant-related tests
    admin: Admin-related tests
    order: Order-related tests
    appointment: Appointment-related tests
    product: Product-related tests
    service: Service-related tests
    review: Review-related tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

minversion = 7.0

asyncio_mode = auto

xfail_strict = true

junit_family = xunit2
junit_logging = all
junit_duration_report = call
junit_suite_name = PetShop Test Suite

testpaths = tests/unit tests/integration

norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache migrations venv

pythonpath = .

env =
    D:TEST_ENV=ci
    D:DB_HOST=localhost
    D:DB_PORT=3306
    D:DB_USER=root
    D:DB_PASSWORD=123456
    D:DB_NAME=cg_test
