<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加服务 - 宠物服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4CAF50',
                        secondary: '#FF9800',
                        dark: '#333333',
                        light: '#F5F5F5'
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light font-sans">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <i class="fa fa-paw text-primary text-3xl mr-2"></i>
                <span class="text-2xl font-bold text-dark">宠物家园</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button class="flex items-center space-x-2">
                        <i class="fa fa-bell text-gray-500"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center">5</span>
                    </button>
                </div>
                <div class="flex items-center space-x-2">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20merchant%20avatar%2C%20business%20person&image_size=square" alt="商家头像" class="w-8 h-8 rounded-full">
                    <span class="text-gray-700">商家名称</span>
                    <i class="fa fa-caret-down text-gray-500"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="flex pt-16 min-h-screen">
        <!-- 左侧导航栏 -->
        <aside class="w-64 bg-white shadow-md fixed h-screen pt-16">
            <nav class="p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/merchant/dashboard" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-home text-xl text-gray-600"></i>
                            <span>后台首页</span>
                        </a>
                    </li>
                    <li>
                        <a href="/merchant/services" class="flex items-center space-x-3 p-3 bg-primary/10 text-primary rounded-lg">
                            <i class="fa fa-shopping-bag text-xl"></i>
                            <span class="font-medium">服务管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/merchant/appointments" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-calendar text-xl text-gray-600"></i>
                            <span>预约管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="/merchant/profile" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-user text-xl text-gray-600"></i>
                            <span>商家中心</span>
                        </a>
                    </li>
                    <li class="mt-8">
                        <a href="/logout" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-sign-out text-xl text-gray-600"></i>
                            <span>退出登录</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="flex-1 ml-64 p-8">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h1 class="text-2xl font-bold text-dark mb-6">添加服务</h1>
                <form action="/merchant/services/add" method="post" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 mb-2">服务名称</label>
                        <input type="text" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">服务描述</label>
                        <textarea name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">价格</label>
                        <input type="number" step="0.01" name="price" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">时长（分钟）</label>
                        <input type="number" name="duration" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">服务图片</label>
                        <input type="text" name="image" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div class="flex justify-end space-x-4">
                        <a href="/merchant/services" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">取消</a>
                        <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition">保存</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
