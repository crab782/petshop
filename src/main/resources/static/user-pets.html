<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的宠物 - 宠物服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4CAF50',
                        secondary: '#FF9800',
                        dark: '#333333',
                        light: '#F5F5F5'
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>
<body class="bg-light font-sans">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <i class="fa fa-paw text-primary text-3xl mr-2"></i>
                <span class="text-2xl font-bold text-dark">宠物家园</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button class="flex items-center space-x-2">
                        <i class="fa fa-bell text-gray-500"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-xs flex items-center justify-center">3</span>
                    </button>
                </div>
                <div class="flex items-center space-x-2">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=friendly%20asian%20user%20avatar%2C%20professional%20headshot&image_size=square" alt="用户头像" class="w-8 h-8 rounded-full">
                    <span class="text-gray-700">用户名</span>
                    <i class="fa fa-caret-down text-gray-500"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="flex pt-16 min-h-screen">
        <!-- 左侧导航栏 -->
        <aside class="w-64 bg-white shadow-md fixed h-screen pt-16">
            <nav class="p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/user/dashboard" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-home text-xl text-gray-600"></i>
                            <span>后台首页</span>
                        </a>
                    </li>
                    <li>
                        <a href="#forum" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-comments text-xl text-gray-600"></i>
                            <span>交流论坛</span>
                        </a>
                    </li>
                    <li>
                        <a href="#announcement" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-bullhorn text-xl text-gray-600"></i>
                            <span>公告通知</span>
                        </a>
                    </li>
                    <li>
                        <a href="/user/appointments" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-calendar text-xl text-gray-600"></i>
                            <span>预约服务</span>
                        </a>
                    </li>
                    <li>
                        <a href="#shops" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-shopping-bag text-xl text-gray-600"></i>
                            <span>店铺信息</span>
                        </a>
                    </li>
                    <li>
                        <a href="/user/profile" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-user text-xl text-gray-600"></i>
                            <span>个人中心</span>
                        </a>
                    </li>
                    <li>
                        <a href="/user/pets" class="flex items-center space-x-3 p-3 bg-primary/10 text-primary rounded-lg">
                            <i class="fa fa-paw text-xl"></i>
                            <span class="font-medium">我的宠物</span>
                        </a>
                    </li>
                    <li>
                        <a href="#favorites" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-heart text-xl text-gray-600"></i>
                            <span>收藏评价</span>
                        </a>
                    </li>
                    <li>
                        <a href="#reviews" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-star text-xl text-gray-600"></i>
                            <span>服务评价</span>
                        </a>
                    </li>
                    <li class="mt-8">
                        <a href="/logout" class="flex items-center space-x-3 p-3 hover:bg-gray-100 rounded-lg transition">
                            <i class="fa fa-sign-out text-xl text-gray-600"></i>
                            <span>退出登录</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="flex-1 ml-64 p-8">
            <!-- 页面标题 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold text-dark mb-2">我的宠物</h1>
                        <p class="text-gray-600">管理您的宠物信息</p>
                    </div>
                    <a href="/user/pets/add" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-opacity-90 transition">
                        <i class="fa fa-plus mr-2"></i>添加宠物
                    </a>
                </div>
            </div>

            <!-- 宠物列表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 宠物卡片 1 -->
                <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover">
                    <div class="h-48 bg-gray-200 overflow-hidden">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=golden%20retriever%20dog%2C%20friendly%20expression%2C%20professional%20photo&image_size=square" alt="宠物头像" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-dark">小金</h3>
                                <p class="text-gray-600">金毛犬 · 2岁 · 公</p>
                            </div>
                            <span class="inline-block px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs">健康</span>
                        </div>
                        <p class="text-gray-600 mb-4">活泼好动，喜欢和人玩耍，对陌生人也很友好。</p>
                        <div class="flex space-x-2">
                            <button class="flex-1 bg-primary text-white py-2 rounded-lg hover:bg-opacity-90 transition">编辑</button>
                            <button class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50 transition">删除</button>
                        </div>
                    </div>
                </div>

                <!-- 宠物卡片 2 -->
                <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover">
                    <div class="h-48 bg-gray-200 overflow-hidden">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=persian%20cat%2C%20fluffy%2C%20elegant%2C%20professional%20photo&image_size=square" alt="宠物头像" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-dark">咪咪</h3>
                                <p class="text-gray-600">波斯猫 · 1岁 · 母</p>
                            </div>
                            <span class="inline-block px-2 py-1 bg-green-100 text-green-800 rounded-full text-xs">健康</span>
                        </div>
                        <p class="text-gray-600 mb-4">性格温顺，喜欢安静，毛发需要定期打理。</p>
                        <div class="flex space-x-2">
                            <button class="flex-1 bg-primary text-white py-2 rounded-lg hover:bg-opacity-90 transition">编辑</button>
                            <button class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50 transition">删除</button>
                        </div>
                    </div>
                </div>

                <!-- 宠物卡片 3 -->
                <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover">
                    <div class="h-48 bg-gray-200 overflow-hidden">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=teddy%20bear%20dog%2C%20cute%2C%20small%20size%2C%20professional%20photo&image_size=square" alt="宠物头像" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-dark">球球</h3>
                                <p class="text-gray-600">泰迪犬 · 3岁 · 公</p>
                            </div>
                            <span class="inline-block px-2 py-1 bg-yellow-100 text-yellow-800 rounded-full text-xs">需关注</span>
                        </div>
                        <p class="text-gray-600 mb-4">聪明伶俐，有点挑食，需要定期体检。</p>
                        <div class="flex space-x-2">
                            <button class="flex-1 bg-primary text-white py-2 rounded-lg hover:bg-opacity-90 transition">编辑</button>
                            <button class="flex-1 border border-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-50 transition">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 导航菜单激活状态
        const navLinks = document.querySelectorAll('nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                navLinks.forEach(item => item.classList.remove('bg-primary/10', 'text-primary'));
                navLinks.forEach(item => item.classList.add('hover:bg-gray-100'));
                this.classList.add('bg-primary/10', 'text-primary');
                this.classList.remove('hover:bg-gray-100');
            });
        });
    </script>
</body>
</html>
