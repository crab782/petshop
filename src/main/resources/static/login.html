<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 宠物服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4CAF50',
                        secondary: '#FF9800',
                        dark: '#333333',
                        light: '#F5F5F5'
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>
<body class="bg-light font-sans">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
                <i class="fa fa-paw text-primary text-3xl mr-2"></i>
                <span class="text-2xl font-bold text-dark">宠物家园</span>
            </div>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="text-dark hover:text-primary font-medium">首页</a>
                <a href="index.html#services" class="text-dark hover:text-primary font-medium">服务</a>
                <a href="index.html#pets" class="text-dark hover:text-primary font-medium">宠物展示</a>
                <a href="index.html#about" class="text-dark hover:text-primary font-medium">关于我们</a>
                <a href="index.html#contact" class="text-dark hover:text-primary font-medium">联系我们</a>
            </div>
            <div class="flex items-center space-x-4">
                <button class="bg-primary text-white px-4 py-2 rounded-full hover:bg-opacity-90 transition">登录</button>
                <button class="md:hidden text-dark text-2xl">
                    <i class="fa fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 登录区域 -->
    <section class="pt-32 pb-16">
        <div class="container mx-auto px-4">
            <div class="max-w-md mx-auto bg-white rounded-lg shadow-xl overflow-hidden">
                <div class="p-8">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa fa-user text-primary text-2xl"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-dark mb-2">欢迎回来</h2>
                        <p class="text-gray-600">请登录您的账户</p>
                    </div>
                    <div class="flex border-b mb-6">
                        <button id="userLoginTab" class="flex-1 py-2 text-center text-primary border-b-2 border-primary font-medium">用户登录</button>
                        <button id="adminLoginTab" class="flex-1 py-2 text-center text-gray-500 font-medium">管理员登录</button>
                    </div>
                    <div id="userLoginForm">
                    <form action="/login" method="post" class="space-y-4">
                        <input type="hidden" name="type" value="user">
                        <div>
                            <label class="block text-gray-700 mb-2">用户名/邮箱</label>
                            <div class="relative">
                                <i class="fa fa-user absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" name="email" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input type="checkbox" id="remember" class="mr-2">
                                <label for="remember" class="text-gray-600 text-sm">记住我</label>
                            </div>
                            <a href="#" class="text-primary hover:underline text-sm">忘记密码？</a>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition">登录</button>
                    </form>
                    </div>
                    <div id="adminLoginForm" class="hidden">
                    <form action="/login" method="post" class="space-y-4">
                        <input type="hidden" name="type" value="admin">
                        <div>
                            <label class="block text-gray-700 mb-2">管理员账号</label>
                            <div class="relative">
                                <i class="fa fa-user-circle absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" name="email" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input type="checkbox" id="adminRemember" class="mr-2">
                                <label for="adminRemember" class="text-gray-600 text-sm">记住我</label>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition">登录</button>
                    </form>
                    </div>
                    <div class="mt-6 text-center">
                        <p class="text-gray-600">还没有账户？ <a href="#" class="text-primary hover:underline font-medium">立即注册</a></p>
                    </div>
                    <div class="mt-8">
                        <div class="flex items-center justify-center">
                            <div class="h-px bg-gray-300 flex-grow"></div>
                            <span class="px-4 text-gray-500 text-sm">其他登录方式</span>
                            <div class="h-px bg-gray-300 flex-grow"></div>
                        </div>
                        <div class="flex justify-center space-x-4 mt-4">
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
                                <i class="fa fa-weixin text-green-600"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
                                <i class="fa fa-qq text-blue-500"></i>
                            </a>
                            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
                                <i class="fa fa-weibo text-red-500"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部区域 -->
    <footer class="bg-dark text-white py-12">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div>
                    <div class="flex items-center mb-4">
                        <i class="fa fa-paw text-primary text-2xl mr-2"></i>
                        <span class="text-xl font-bold">宠物家园</span>
                    </div>
                    <p class="text-gray-400 mb-4">专业的宠物服务平台，为您的爱宠提供全方位的呵护与关怀</p>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-400 hover:text-primary transition">
                            <i class="fa fa-weixin"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-primary transition">
                            <i class="fa fa-weibo"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-primary transition">
                            <i class="fa fa-instagram"></i>
                        </a>
                        <a href="#" class="text-gray-400 hover:text-primary transition">
                            <i class="fa fa-facebook"></i>
                        </a>
                    </div>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-4">服务</h4>
                    <ul class="space-y-2">
                        <li><a href="#" class="text-gray-400 hover:text-primary transition">宠物美容</a></li>
                        <li><a href="#" class="text-gray-400 hover:text-primary transition">健康体检</a></li>
                        <li><a href="#" class="text-gray-400 hover:text-primary transition">宠物寄养</a></li>
                        <li><a href="#" class="text-gray-400 hover:text-primary transition">宠物饮食</a></li>
                        <li><a href="#" class="text-gray-400 hover:text-primary transition">宠物训练</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-4">快速链接</h4>
                    <ul class="space-y-2">
                        <li><a href="index.html" class="text-gray-400 hover:text-primary transition">首页</a></li>
                        <li><a href="index.html#services" class="text-gray-400 hover:text-primary transition">服务</a></li>
                        <li><a href="index.html#pets" class="text-gray-400 hover:text-primary transition">宠物展示</a></li>
                        <li><a href="index.html#about" class="text-gray-400 hover:text-primary transition">关于我们</a></li>
                        <li><a href="index.html#contact" class="text-gray-400 hover:text-primary transition">联系我们</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-semibold mb-4">联系我们</h4>
                    <ul class="space-y-2">
                        <li class="flex items-start">
                            <i class="fa fa-map-marker text-primary mt-1 mr-2"></i>
                            <span class="text-gray-400">北京市朝阳区建国路88号</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-phone text-primary mt-1 mr-2"></i>
                            <span class="text-gray-400">010-12345678</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-envelope text-primary mt-1 mr-2"></i>
                            <span class="text-gray-400">info@pet-home.com</span>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-gray-800 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2026 宠物家园. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <button id="backToTop" class="fixed bottom-8 right-8 bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg opacity-0 invisible transition-all duration-300">
        <i class="fa fa-arrow-up"></i>
    </button>

    <script>
        // 登录类型切换功能
        const userLoginTab = document.getElementById('userLoginTab');
        const adminLoginTab = document.getElementById('adminLoginTab');
        const userLoginForm = document.getElementById('userLoginForm');
        const adminLoginForm = document.getElementById('adminLoginForm');
        
        userLoginTab.addEventListener('click', function() {
            userLoginTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            userLoginTab.classList.remove('text-gray-500');
            adminLoginTab.classList.add('text-gray-500');
            adminLoginTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            userLoginForm.classList.remove('hidden');
            adminLoginForm.classList.add('hidden');
        });
        
        adminLoginTab.addEventListener('click', function() {
            adminLoginTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            adminLoginTab.classList.remove('text-gray-500');
            userLoginTab.classList.add('text-gray-500');
            userLoginTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            adminLoginForm.classList.remove('hidden');
            userLoginForm.classList.add('hidden');
        });
        
        // 密码可见性切换
        const passwordInputs = document.querySelectorAll('input[type="password"]');
        passwordInputs.forEach(input => {
            const eyeIcon = input.nextElementSibling;
            if (eyeIcon && eyeIcon.querySelector('i')) {
                eyeIcon.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    eyeIcon.querySelector('i').classList.toggle('fa-eye');
                    eyeIcon.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }
        });
        
        // 返回顶部按钮功能
        const backToTopBtn = document.getElementById('backToTop');
        
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 300) {
                backToTopBtn.classList.remove('opacity-0', 'invisible');
                backToTopBtn.classList.add('opacity-100', 'visible');
            } else {
                backToTopBtn.classList.remove('opacity-100', 'visible');
                backToTopBtn.classList.add('opacity-0', 'invisible');
            }
        });
        
        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
