    <!-- 注册区域 -->

        <div class="container mx-auto px-4">
            <div class="max-w-md mx-auto bg-white rounded-lg shadow-xl overflow-hidden">

                    <div class="flex border-b mb-6">

                    <!-- 错误信息提示区域 -->
                    <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                        <span id="errorText"></span>
                    </div>
                    <!-- 成功信息提示区域 -->
                    <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                        <span id="successText"></span>
                    </div>

                    <div id="userRegisterForm">
                    <form action="/register/user" method="post" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">用户名</label>
                            <div class="relative">
                                <i class="fa fa-user absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" name="username" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">邮箱</label>
                            <div class="relative">
                                <i class="fa fa-envelope absolute left-3 top-3 text-gray-400"></i>
                                <input type="email" name="email" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">确认密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="confirmPassword" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">手机号码</label>
                            <div class="relative">
                                <i class="fa fa-phone absolute left-3 top-3 text-gray-400"></i>
                                <input type="tel" name="phone" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="agree" class="mr-2">
                            <label for="agree" class="text-gray-600 text-sm">我已阅读并同意 <a href="#" class="text-primary hover:underline">用户协议</a> 和 <a href="#" class="text-primary hover:underline">隐私政策</a></label>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition">注册</button>
                    </form>
                    </div>
                    <div id="merchantRegisterForm" class="hidden">
                    <form action="/register/merchant" method="post" class="space-y-4">

                        <div>

                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">联系电话</label>
                            <div class="relative">
                                <i class="fa fa-phone absolute left-3 top-3 text-gray-400"></i>
                                <input type="tel" name="phone" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">邮箱</label>
                            <div class="relative">
                                <i class="fa fa-envelope absolute left-3 top-3 text-gray-400"></i>
                                <input type="email" name="email" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">确认密码</label>
                            <div class="relative">
                                <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                                <input type="password" name="confirmPassword" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">

                        <div>

                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="merchantAgree" class="mr-2">
                            <label for="merchantAgree" class="text-gray-600 text-sm">我已阅读并同意 <a href="#" class="text-primary hover:underline">商家协议</a> 和 <a href="#" class="text-primary hover:underline">隐私政策</a></label>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition">注册</button>
                    </form>

    <!-- 返回顶部按钮 -->
    <button id="backToTop" class="fixed bottom-8 right-8 bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg opacity-0 invisible transition-all duration-300">
        <i class="fa fa-arrow-up"></i>
    </button>

    <script>
        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        // 显示成功信息
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successDiv.classList.remove('hidden');
        }

        // 页面加载时检查URL参数
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const success = urlParams.get('success');

            if (error) {
                showError(decodeURIComponent(error));
            }
            if (success) {
                showSuccess(decodeURIComponent(success));
            }
        });

        // 注册类型切换功能
        const userRegisterTab = document.getElementById('userRegisterTab');
        const merchantRegisterTab = document.getElementById('merchantRegisterTab');
        const userRegisterForm = document.getElementById('userRegisterForm');
        const merchantRegisterForm = document.getElementById('merchantRegisterForm');
        
        userRegisterTab.addEventListener('click', function() {
            userRegisterTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            userRegisterTab.classList.remove('text-gray-500');
            merchantRegisterTab.classList.add('text-gray-500');
            merchantRegisterTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            userRegisterForm.classList.remove('hidden');
            merchantRegisterForm.classList.add('hidden');
        });
        
        merchantRegisterTab.addEventListener('click', function() {
            merchantRegisterTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            merchantRegisterTab.classList.remove('text-gray-500');
            userRegisterTab.classList.add('text-gray-500');
            userRegisterTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            merchantRegisterForm.classList.remove('hidden');
            userRegisterForm.classList.add('hidden');
        });
        
        // 密码可见性切换
        const passwordInputs = document.querySelectorAll('input[type="password"]');
        passwordInputs.forEach(input => {
            const eyeIcon = input.nextElementSibling;
            if (eyeIcon && eyeIcon.querySelector('i')) {
                eyeIcon.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    eyeIcon.querySelector('i').classList.toggle('fa-eye');
                    eyeIcon.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }
        });
        
        // 返回顶部按钮功能
        const backToTopBtn = document.getElementById('backToTop');
        
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 300) {
                backToTopBtn.classList.remove('opacity-0', 'invisible');
                backToTopBtn.classList.add('opacity-100', 'visible');
            } else {
                backToTopBtn.classList.remove('opacity-100', 'visible');
                backToTopBtn.classList.add('opacity-0', 'invisible');
            }
        });
        
        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
