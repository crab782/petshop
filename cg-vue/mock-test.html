<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock服务测试</title>
  <script src="https://cdn.jsdelivr.net/npm/mockjs@1.1.0/dist/mock.min.js"></script>
</head>
<body>
  <h1>Mock服务测试</h1>
  <button onclick="testMerchantInfo()">测试获取商家信息</button>
  <button onclick="testRegister()">测试商家注册</button>
  <button onclick="testStats()">测试统计概览</button>
  <div id="result"></div>

  <script>
    // 配置Mock服务
    Mock.mock('/api/merchant/info', 'get', () => {
      return {
        code: 200,
        message: 'success',
        data: {
          id: 1,
          name: '宠物乐园',
          contact_person: '张三',
          phone: '13800138000',
          email: 'merchant@example.com',
          address: '北京市朝阳区建国路88号',
          logo: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=pet%20shop%20logo%20colorful%20friendly&image_size=square',
          status: 'approved',
          created_at: '2023-01-01 00:00:00',
          updated_at: '2023-01-01 00:00:00'
        }
      };
    });

    Mock.mock('/api/merchant/register', 'post', (req) => {
      const { email } = JSON.parse(req.body);
      if (email === 'existing@example.com') {
        return {
          code: 400,
          message: '邮箱已被注册',
          data: null
        };
      }
      return {
        code: 200,
        message: '注册成功，等待审核',
        data: {
          id: Mock.Random.integer(1000, 9999),
          status: 'pending'
        }
      };
    });

    Mock.mock('/api/merchant/dashboard/stats', 'get', () => {
      return {
        code: 200,
        message: 'success',
        data: {
          today_orders: 15,
          pending_appointments: 5,
          today_revenue: 2500.50,
          average_rating: 4.5
        }
      };
    });

    // 测试函数
    function testMerchantInfo() {
      fetch('/api/merchant/info')
        .then(response => response.json())
        .then(data => {
          document.getElementById('result').innerHTML = '<h2>获取商家信息结果</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
        })
        .catch(error => {
          document.getElementById('result').innerHTML = '<h2>错误</h2><pre>' + error.message + '</pre>';
        });
    }

    function testRegister() {
      fetch('/api/merchant/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: 'test@example.com' })
      })
        .then(response => response.json())
        .then(data => {
          document.getElementById('result').innerHTML = '<h2>商家注册结果</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
        })
        .catch(error => {
          document.getElementById('result').innerHTML = '<h2>错误</h2><pre>' + error.message + '</pre>';
        });
    }

    function testStats() {
      fetch('/api/merchant/dashboard/stats')
        .then(response => response.json())
        .then(data => {
          document.getElementById('result').innerHTML = '<h2>统计概览结果</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
        })
        .catch(error => {
          document.getElementById('result').innerHTML = '<h2>错误</h2><pre>' + error.message + '</pre>';
        });
    }
  </script>
</body>
</html>
