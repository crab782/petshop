name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cg-vue/package-lock.json

      - name: Install dependencies
        working-directory: ./cg-vue
        run: npm ci

      - name: Run unit tests
        working-directory: ./cg-vue
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./cg-vue/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            cg-vue/coverage/
            cg-vue/test-results/
          retention-days: 30

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cg-vue/package-lock.json

      - name: Install dependencies
        working-directory: ./cg-vue
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./cg-vue
        run: npx playwright install --with-deps

      - name: Build application
        working-directory: ./cg-vue
        run: npm run build

      - name: Run E2E tests
        working-directory: ./cg-vue
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: cg-vue/playwright-report/
          retention-days: 30

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cg-vue/package-lock.json

      - name: Install dependencies
        working-directory: ./cg-vue
        run: npm ci

      - name: Run type check
        working-directory: ./cg-vue
        run: npm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cg-vue/package-lock.json

      - name: Install dependencies
        working-directory: ./cg-vue
        run: npm ci

      - name: Run lint
        working-directory: ./cg-vue
        run: npm run lint
