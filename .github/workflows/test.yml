name: Python Test Suite

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to test'
        required: false
        default: '3.11'
      run_performance:
        description: 'Run performance tests'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MYSQL_ROOT_PASSWORD: 123456
  MYSQL_DATABASE: cg_test
  TEST_REPORT_DIR: test-reports
  COVERAGE_REPORT_DIR: coverage-reports

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: Run Black
        run: black --check tests/

      - name: Run isort
        run: isort --check-only tests/

      - name: Run flake8
        run: flake8 tests/ --max-line-length=120 --exclude=tests/__pycache__,tests/fixtures

      - name: Run mypy
        run: mypy tests/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
        exclude:
          - os: windows-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.9'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Cache pytest cache
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ matrix.python-version }}-${{ hashFiles('tests/**') }}
          restore-keys: |
            ${{ runner.os }}-pytest-${{ matrix.python-version }}-
            ${{ runner.os }}-pytest-

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html pytest-xdist pytest-rerunfailures allure-pytest

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html pytest-xdist pytest-rerunfailures allure-pytest

      - name: Wait for MySQL to be ready (Unix)
        if: runner.os != 'Windows'
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h "127.0.0.1" -P 3306 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Wait for MySQL to be ready (Windows)
        if: runner.os == 'Windows'
        run: |
          $i = 1
          while ($i -le 30) {
            try {
              mysqladmin ping -h "127.0.0.1" -P 3306 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} 2>$null
              Write-Host "MySQL is ready!"
              break
            }
            catch {
              Write-Host "Waiting for MySQL... ($i/30)"
              Start-Sleep -Seconds 2
              $i++
            }
          }

      - name: Initialize test database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
        run: |
          python tests/testdata/data_manager.py --init-test-db

      - name: Create test report directories
        run: |
          mkdir -p ${{ env.TEST_REPORT_DIR }}
          mkdir -p ${{ env.COVERAGE_REPORT_DIR }}

      - name: Run unit tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          API_BASE_URL: http://localhost:8080
          TEST_ENV: ci
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=tests \
            --cov-report=xml:${{ env.COVERAGE_REPORT_DIR }}/coverage-unit.xml \
            --cov-report=html:${{ env.COVERAGE_REPORT_DIR }}/html-unit \
            --html=${{ env.TEST_REPORT_DIR }}/unit-report.html \
            --self-contained-html \
            --junitxml=${{ env.TEST_REPORT_DIR }}/unit-junit.xml \
            --alluredir=${{ env.TEST_REPORT_DIR }}/allure-unit \
            -n auto \
            --reruns 2 \
            --reruns-delay 5

      - name: Run integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          API_BASE_URL: http://localhost:8080
          TEST_ENV: ci
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=tests \
            --cov-report=xml:${{ env.COVERAGE_REPORT_DIR }}/coverage-integration.xml \
            --cov-report=html:${{ env.COVERAGE_REPORT_DIR }}/html-integration \
            --html=${{ env.TEST_REPORT_DIR }}/integration-report.html \
            --self-contained-html \
            --junitxml=${{ env.TEST_REPORT_DIR }}/integration-junit.xml \
            --alluredir=${{ env.TEST_REPORT_DIR }}/allure-integration \
            -n auto \
            --reruns 2 \
            --reruns-delay 5

      - name: Generate combined coverage report
        run: |
          coverage combine ${{ env.COVERAGE_REPORT_DIR }}/coverage-unit.xml ${{ env.COVERAGE_REPORT_DIR }}/coverage-integration.xml || true
          coverage xml -o ${{ env.COVERAGE_REPORT_DIR }}/coverage-combined.xml || true
          coverage html -d ${{ env.COVERAGE_REPORT_DIR }}/html-combined || true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            ${{ env.TEST_REPORT_DIR }}/
            ${{ env.COVERAGE_REPORT_DIR }}/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ${{ env.COVERAGE_REPORT_DIR }}/coverage-combined.xml
          flags: unittests,integration
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          files: ${{ env.TEST_REPORT_DIR }}/*-junit.xml
          check_name: Test Results (Python ${{ matrix.python-version }})
          comment_mode: off

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || github.event.inputs.run_performance == 'true'
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h "127.0.0.1" -P 3306 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Initialize test database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
        run: |
          python tests/testdata/data_manager.py --init-test-db

      - name: Run performance tests
        run: |
          mkdir -p performance-reports
          locust -f tests/performance/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 10 \
            --run-time 5m \
            --host http://localhost:8080 \
            --html performance-reports/report.html \
            --csv performance-reports/stats
        continue-on-error: true

      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: performance-reports/
          retention-days: 30

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: all-reports
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install allure

      - name: Generate Allure report
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/allure-history" ]; then
            cp -r gh-pages/allure-history/history allure-history/ 2>/dev/null || true
          fi
          allure generate all-reports/${{ env.TEST_REPORT_DIR }}/allure-unit -o allure-report --clean || true
          allure generate all-reports/${{ env.TEST_REPORT_DIR }}/allure-integration -o allure-report-integration --clean || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [test, allure-report]
    if: failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: reports
          merge-multiple: true

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Test Failed - ${{ github.repository }}"
          body: |
            Test suite failed!
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Please check the test reports:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: CI/CD Bot

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ Test suite failed!
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Test Failure - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Test Failure Report
            
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            
            ### Details
            - Run ID: ${{ github.run_id }}
            - [View Test Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            Please investigate and fix the failing tests.`;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['test-failure', 'automated']
              });
            }
