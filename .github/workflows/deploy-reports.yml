name: Deploy Test Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Python Test Suite"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: all-reports
          merge-multiple: true
        continue-on-error: true

      - name: Download performance artifacts
        uses: actions/download-artifact@v4
        with:
          name: performance-reports
          path: performance-reports
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Generate index page
        run: |
          mkdir -p _site
          
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>PetShop 测试报告</title>
              <style>
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      max-width: 1200px;
                      margin: 0 auto;
                      padding: 20px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                  }
                  .container {
                      background: white;
                      border-radius: 10px;
                      padding: 30px;
                      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                  }
                  h1 {
                      color: #333;
                      text-align: center;
                      margin-bottom: 30px;
                  }
                  .report-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                      gap: 20px;
                      margin-top: 20px;
                  }
                  .report-card {
                      border: 1px solid #ddd;
                      border-radius: 8px;
                      padding: 20px;
                      transition: transform 0.3s, box-shadow 0.3s;
                  }
                  .report-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                  }
                  .report-card h3 {
                      color: #667eea;
                      margin-top: 0;
                  }
                  .report-card ul {
                      list-style: none;
                      padding: 0;
                  }
                  .report-card li {
                      margin: 10px 0;
                  }
                  .report-card a {
                      color: #764ba2;
                      text-decoration: none;
                      font-weight: 500;
                  }
                  .report-card a:hover {
                      text-decoration: underline;
                  }
                  .timestamp {
                      text-align: center;
                      color: #666;
                      margin-top: 30px;
                      font-size: 14px;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🧪 PetShop 测试报告中心</h1>
                  
                  <div class="report-grid">
                      <div class="report-card">
                          <h3>📊 单元测试报告</h3>
                          <ul>
                              <li><a href="all-reports/test-reports/unit-report.html">HTML 报告</a></li>
                              <li><a href="all-reports/test-reports/unit-junit.xml">JUnit XML</a></li>
                          </ul>
                      </div>
                      
                      <div class="report-card">
                          <h3>🔗 集成测试报告</h3>
                          <ul>
                              <li><a href="all-reports/test-reports/integration-report.html">HTML 报告</a></li>
                              <li><a href="all-reports/test-reports/integration-junit.xml">JUnit XML</a></li>
                          </ul>
                      </div>
                      
                      <div class="report-card">
                          <h3>📈 覆盖率报告</h3>
                          <ul>
                              <li><a href="all-reports/coverage-reports/html-combined/index.html">HTML 覆盖率报告</a></li>
                              <li><a href="all-reports/coverage-reports/coverage-combined.xml">XML 覆盖率报告</a></li>
                          </ul>
                      </div>
                      
                      <div class="report-card">
                          <h3>🎨 Allure 报告</h3>
                          <ul>
                              <li><a href="allure-report/index.html">Allure 测试报告</a></li>
                              <li><a href="allure-report-integration/index.html">集成测试报告</a></li>
                          </ul>
                      </div>
                      
                      <div class="report-card">
                          <h3>⚡ 性能测试报告</h3>
                          <ul>
                              <li><a href="performance-reports/report.html">Locust 性能报告</a></li>
                              <li><a href="performance-reports/stats_stats.csv">统计数据 CSV</a></li>
                          </ul>
                      </div>
                  </div>
                  
                  <div class="timestamp">
                      报告生成时间: <span id="timestamp"></span>
                  </div>
              </div>
              
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString('zh-CN');
              </script>
          </body>
          </html>
          EOF

      - name: Move reports to site
        run: |
          if [ -d "all-reports" ]; then
            cp -r all-reports/* _site/ 2>/dev/null || true
          fi
          if [ -d "performance-reports" ]; then
            cp -r performance-reports _site/ 2>/dev/null || true
          fi

      - name: Setup Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure
          sudo apt-get update
          sudo apt-get install allure

      - name: Generate Allure reports
        run: |
          if [ -d "all-reports/test-reports/allure-unit" ]; then
            allure generate all-reports/test-reports/allure-unit -o _site/allure-report --clean || true
          fi
          if [ -d "all-reports/test-reports/allure-integration" ]; then
            allure generate all-reports/test-reports/allure-integration -o _site/allure-report-integration --clean || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with report URL
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${{ github.event.workflow_run.head_branch }}`
            });
            
            if (pullRequests.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequests[0].number,
                body: `## 📊 测试报告已发布\n\n测试报告已发布到 GitHub Pages:\n\n🔗 [查看测试报告](${{ steps.deployment.outputs.page_url }})\n\n### 报告类型\n- ✅ 单元测试报告\n- ✅ 集成测试报告\n- ✅ 覆盖率报告\n- ✅ Allure 测试报告\n- ✅ 性能测试报告（如适用）`
              });
            }
