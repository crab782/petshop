name: Test Failure Notification

on:
  workflow_run:
    workflows: ["Python Test Suite"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get workflow run info
        id: run-info
        run: |
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          echo "head_branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.event.workflow_run.actor.login }}" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: secrets.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ 测试失败 - ${{ github.repository }} (Run #${{ steps.run-info.outputs.run_number }})"
          body: |
            测试套件执行失败！
            
            ## 基本信息
            - **仓库**: ${{ github.repository }}
            - **分支**: ${{ steps.run-info.outputs.head_branch }}
            - **提交**: ${{ steps.run-info.outputs.head_sha }}
            - **执行者**: ${{ steps.run-info.outputs.actor }}
            - **运行编号**: #${{ steps.run-info.outputs.run_number }}
            
            ## 查看详情
            请访问以下链接查看详细测试报告：
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }}
            
            ---
            此邮件由 CI/CD 系统自动发送，请勿回复。
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: CI/CD Bot <${{ secrets.SMTP_USERNAME }}>

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            ❌ 测试失败通知
            
            *仓库*: ${{ github.repository }}
            *分支*: ${{ steps.run-info.outputs.head_branch }}
            *提交*: ${{ steps.run-info.outputs.head_sha }}
            *执行者*: ${{ steps.run-info.outputs.actor }}
            
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }}|查看测试报告>
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Send DingTalk notification
        if: secrets.DINGTALK_WEBHOOK != ''
        uses: zcong1993/actions-dingtalk@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "测试失败通知",
                "text": "## ❌ 测试失败通知\n\n**仓库**: ${{ github.repository }}\n\n**分支**: ${{ steps.run-info.outputs.head_branch }}\n\n**提交**: ${{ steps.run-info.outputs.head_sha }}\n\n**执行者**: ${{ steps.run-info.outputs.actor }}\n\n[查看测试报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }})"
              }
            }

      - name: Send WeChat Work notification
        if: secrets.WECHAT_WEBHOOK != ''
        uses: chf007/action-wechat-work@master
        env:
          WECHAT_WORK_BOT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        with:
          msgtype: markdown
          content: |
            # ❌ 测试失败通知
            > 仓库: ${{ github.repository }}
            > 分支: ${{ steps.run-info.outputs.head_branch }}
            > 提交: ${{ steps.run-info.outputs.head_sha }}
            > 执行者: ${{ steps.run-info.outputs.actor }}
            > [查看测试报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }})

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🧪 测试失败 - ${new Date().toISOString().split('T')[0]}`;
            const body = `## 测试失败报告
            
            ### 基本信息
            - **仓库**: ${{ github.repository }}
            - **分支**: ${{ steps.run-info.outputs.head_branch }}
            - **提交**: ${{ steps.run-info.outputs.head_sha }}
            - **执行者**: ${{ steps.run-info.outputs.actor }}
            - **运行编号**: #${{ steps.run-info.outputs.run_number }}
            
            ### 查看详情
            - [测试报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }})
            - [覆盖率报告](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/all-reports/coverage-reports/html-combined/index.html)
            
            ### 下一步操作
            1. 查看测试报告了解失败详情
            2. 修复失败的测试用例
            3. 重新运行测试验证修复
            
            ---
            此 Issue 由 CI/CD 系统自动创建。`;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure',
              per_page: 10
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.title.includes('测试失败') && 
              issue.title.includes(new Date().toISOString().split('T')[0])
            );
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['test-failure', 'automated', 'needs-attention'],
                assignees: ['${{ steps.run-info.outputs.actor }}']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## 新的测试失败\n\n运行编号: #${{ steps.run-info.outputs.run_number }}\n\n[查看报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.run-info.outputs.run_id }})`
              });
            }
