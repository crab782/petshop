version: '3.8'

networks:
  petshop-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:
  mysql:
    image: mysql:8.0
    container_name: petshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: cg
    volumes:
      - mysql-data:/var/lib/mysql
      - ./petshop_423.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petshop-network
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: petshop-redis
    volumes:
      - redis-data:/data
    networks:
      - petshop-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cg?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: petshop-default-secret-key-for-jwt-token-generation-and-validation-must-be-at-least-256-bits
    ports:
      - "8080:8080"
    networks:
      - petshop-network
    depends_on:
      - mysql
      - redis
    restart: always
