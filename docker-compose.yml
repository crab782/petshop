version: '3.8'

networks:
  petshop-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:
  mysql:
    image: mysql:8.0
    container_name: petshop-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: cg
    volumes:
      - mysql-data:/var/lib/mysql
      - ./petshop_423.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petshop-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: petshop-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - petshop-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cg?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: petshop-default-secret-key-for-jwt-token-generation-and-validation-must-be-at-least-256-bits
    networks:
      - petshop-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: ./petshop-vue
      dockerfile: Dockerfile
    container_name: petshop-nginx
    ports:
      - "80:80"
    networks:
      - petshop-network
    depends_on:
      - app
    restart: always
