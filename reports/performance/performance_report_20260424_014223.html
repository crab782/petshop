<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物服务平台 - 性能测试报告</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
        }
        .content {
            padding: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .metrics-table th,
        .metrics-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .metrics-table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>宠物服务平台 - 性能测试报告</h1>
            <p>生成时间: 2026-04-24 01:42:23</p>
        </div>
        
        <div class="content">
            <h2>性能概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">10</div>
                    <div class="stat-label">总请求数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number success">9</div>
                    <div class="stat-label">成功请求</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number error">1</div>
                    <div class="stat-label">失败请求</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">10.00%</div>
                    <div class="stat-label">错误率</div>
                </div>
            </div>
            
            <h2>响应时间统计</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">96.91ms</div>
                    <div class="stat-label">平均响应时间</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">32.90ms</div>
                    <div class="stat-label">最小响应时间</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">289.50ms</div>
                    <div class="stat-label">最大响应时间</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">233016.89</div>
                    <div class="stat-label">吞吐量 (req/s)</div>
                </div>
            </div>
            
            <h2>百分位响应时间</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">78.50ms</div>
                    <div class="stat-label">P50</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number warning">289.50ms</div>
                    <div class="stat-label">P95</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number error">289.50ms</div>
                    <div class="stat-label">P99</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
